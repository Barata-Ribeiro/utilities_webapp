name: tests

on:
    push:
        branches:
            - develop
            - main
            - master
            - workos
    pull_request:
        branches:
            - develop
            - main
            - master
            - workos

jobs:
    ci:
        timeout-minutes: 60
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
                  cache: true

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 25
                  registry-url: https://registry.npmjs.org
                  cache: pnpm

            - name: Install Node Dependencies
              run: pnpm install --frozen-lockfile

            - name: Install playwright dependencies
              run: pnpm dlx playwright install --with-deps

            - name: Run tests
              run: pnpm run tests

            - uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                name: test-results
                path: test-results/
                retention-days: 30
