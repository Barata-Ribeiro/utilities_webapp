name: tests

on:
    push:
        branches:
            - develop
            - main
            - master
            - workos
    pull_request:
        branches:
            - develop
            - main
            - master
            - workos

jobs:
    ci:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.61.0-noble
            options: --user 1001

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: latest
                  cache: true

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 25
                  registry-url: https://registry.npmjs.org
                  cache: pnpm

            - name: Install Node Dependencies
              run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

            - name: Run tests
              run: pnpm run tests
